<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oops! Something went wrong | ARB Farms</title>
  
  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  
  <!-- Custom Styles -->
  <link href="/css/index.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

  <!-- Minimal Navbar for Error Page -->
  <nav class="navbar navbar-expand-lg bg-forest sticky-top shadow-sm py-2">
    <div class="container justify-content-center">
      <a class="navbar-brand d-flex align-items-center mx-0" href="/index.html">
        <img src="/catalog/arbfarms-logo-v2.svg" alt="ARB Farms Logo" class="me-2" onerror="this.src='https://placehold.co/40x40/2a3f29/ffffff?text=ARB'">
        <span class="font-primary text-white fs-4 tracking-wide">ARB FARMS</span>
      </a>
    </div>
  </nav>

  <!-- Error Content Container -->
  <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="container text-center">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          
          <!-- Error Icon & Code -->
          <div class="mb-4 position-relative d-inline-block">
            <h1 id="error-code" class="display-1 fw-black text-primary mb-0" style="font-size: 8rem; opacity: 0.15; letter-spacing: -5px;">404</h1>
            <i id="error-icon" class="bi bi-compass position-absolute top-50 start-50 translate-middle text-primary" style="font-size: 4rem;"></i>
          </div>

          <!-- Error Message -->
          <h2 id="error-title" class="h1 font-primary text-dark mb-3">Looks like you're lost in the fields.</h2>
          <p id="error-description" class="lead text-muted mb-5 font-accent">The page or resource you are looking for does not exist, has been moved, or is temporarily unavailable.</p>
          
          <!-- CTAs -->
          <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
            <a href="/index.html" class="btn btn-primary btn-lg px-4 rounded-pill">
              <i class="bi bi-house-door me-2"></i> Return to Homepage
            </a>
            <a href="/contact.html" class="btn btn-outline-primary btn-lg px-4 rounded-pill">
              <i class="bi bi-headset me-2"></i> Contact Support
            </a>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script>
    // Dynamic Error Management System
    document.addEventListener("DOMContentLoaded", () => {
      // Get URL parameter e.g., ?code=500
      const urlParams = new URLSearchParams(window.location.search);
      let errorCode = urlParams.get('code') || '404'; // Default to 404

      // DOM Elements
      const codeEl = document.getElementById('error-code');
      const iconEl = document.getElementById('error-icon');
      const titleEl = document.getElementById('error-title');
      const descEl = document.getElementById('error-description');

      // Error Code Definitions
      const errorDictionary = {
        '204': {
          title: "Nothing to see here.",
          desc: "The request was successful, but there is no content to display.",
          icon: "bi-dash-circle"
        },
        '400': {
          title: "Bad Request",
          desc: "Our server couldn't understand your request. Please check the information you entered and try again.",
          icon: "bi-exclamation-triangle"
        },
        '401': {
          title: "Unauthorized Access",
          desc: "You need to be logged in to view this page. Please return to the portal and enter your PIN.",
          icon: "bi-shield-lock"
        },
        '403': {
          title: "Access Forbidden",
          desc: "You don't have permission to access this area of the farm.",
          icon: "bi-sign-stop"
        },
        '404': {
          title: "Looks like you're lost in the fields.",
          desc: "The page or product you are looking for does not exist, has been moved, or is temporarily unavailable.",
          icon: "bi-compass"
        },
        '500': {
          title: "Internal Server Error",
          desc: "Our servers are experiencing technical difficulties. Our engineering team has been notified. Please try again later.",
          icon: "bi-database-fill-x"
        },
        '502': {
          title: "Bad Gateway",
          desc: "We received an invalid response from the upstream server. Please refresh the page.",
          icon: "bi-hdd-network"
        },
        '503': {
          title: "Service Unavailable",
          desc: "The website is currently undergoing maintenance to bring you a better experience. We'll be right back!",
          icon: "bi-tools"
        }
      };

      // Set the dynamic content
      const errorData = errorDictionary[errorCode] || errorDictionary['404'];
      
      codeEl.textContent = errorCode;
      iconEl.className = `bi ${errorData.icon} position-absolute top-50 start-50 translate-middle text-primary`;
      titleEl.textContent = errorData.title;
      descEl.textContent = errorData.desc;
      
      // Update document title
      document.title = `${errorCode} ${errorData.title} | ARB Farms`;
    });
  </script>
</body>
</html>
