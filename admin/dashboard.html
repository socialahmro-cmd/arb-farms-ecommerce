<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | ARB Farms Pakistan</title>
  
  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  
  <!-- Custom Styles -->
  <link href="../css/index.css?v=c0cb305a" rel="stylesheet">
  
  <style>
    body {
      background-color: #f0ede6;
    }
    .admin-card {
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      background-color: var(--color-white);
      box-shadow: var(--shadow-sm);
    }
    .status-badge {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 50px;
    }
  </style>

  <!-- PWA Meta Tags -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2b422a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/catalog/arbfarms-logo-v2.svg">

</head>
<body>

  <!-- Top Navbar -->
  <nav class="navbar navbar-expand-lg bg-forest sticky-top shadow-sm py-2">
    <div class="container">
      <span class="navbar-brand d-flex align-items-center">
        <img src="../catalog/arbfarms-logo-v2.svg" alt="ARB Farms Logo" class="me-2" style="height:35px;">
        <span class="font-primary text-white fs-5 tracking-wide">ARB ADMIN PORTAL</span>
      </span>
      <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small d-none d-sm-inline" id="user-email-display">admin@arbfarms.com</span>
        <button class="btn btn-sm btn-outline-light py-1 px-3" id="logout-btn"><i class="bi bi-box-arrow-right me-1"></i> Logout</button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container py-4">
    
    <!-- Analytics Header Cards -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-4 col-lg-2">
        <div class="admin-card p-3 d-flex align-items-center gap-3 h-100">
          <div class="bg-primary text-white p-2 rounded-3 fs-5"><i class="bi bi-wallet2"></i></div>
          <div>
            <span class="text-muted small d-block">Total Sales</span>
            <strong class="h6 mb-0 font-primary text-dark" id="stat-sales">Rs. 0</strong>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-2">
        <div class="admin-card p-3 d-flex align-items-center gap-3 h-100">
          <div class="bg-info text-white p-2 rounded-3 fs-5"><i class="bi bi-calendar-day"></i></div>
          <div>
            <span class="text-muted small d-block">Orders Today</span>
            <strong class="h6 mb-0 font-primary text-dark" id="stat-today">0</strong>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-3">
        <div class="admin-card p-3 d-flex align-items-center gap-3 h-100">
          <div class="bg-warning text-dark p-2 rounded-3 fs-5"><i class="bi bi-clock-history"></i></div>
          <div>
            <span class="text-muted small d-block">Pending Review</span>
            <strong class="h6 mb-0 font-primary text-dark" id="stat-pending">0</strong>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-6 col-lg-2">
        <div class="admin-card p-3 d-flex align-items-center gap-3 h-100">
          <div class="bg-success text-white p-2 rounded-3 fs-5"><i class="bi bi-box-seam"></i></div>
          <div>
            <span class="text-muted small d-block">Dispatched</span>
            <strong class="h6 mb-0 font-primary text-dark" id="stat-dispatched">0</strong>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-lg-3">
        <div class="admin-card p-3 d-flex align-items-center gap-3 h-100">
          <div class="bg-secondary text-white p-2 rounded-3 fs-5"><i class="bi bi-scale"></i></div>
          <div>
            <span class="text-muted small d-block">Total Weight</span>
            <strong class="h6 mb-0 font-primary text-dark" id="stat-weight">0 kg</strong>
          </div>
        </div>
      </div>
    </div>

    <!-- Active Orders list -->
    <div class="admin-card p-4">
      <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-3">
        <h2 class="h5 font-primary mb-0 text-dark d-flex align-items-center gap-2">
          Customer Order Management
          <span class="badge bg-forest py-1 px-2 small" id="orders-count-badge">0</span>
        </h2>
        
        <div class="d-flex gap-2 flex-wrap">
          <div class="input-group input-group-sm" style="width: 250px;">
            <span class="input-group-text bg-light"><i class="bi bi-search"></i></span>
            <input type="text" id="search-input" class="form-control" placeholder="Search order, name, phone...">
          </div>
          <select id="filter-status" class="form-select form-select-sm" style="width: 150px;">
            <option value="">All Statuses</option>
            <option value="Awaiting Receipt">Awaiting Receipt</option>
            <option value="Awaiting Verification">Verifying</option>
            <option value="Verified & Processing">Processing</option>
            <option value="Dispatched">Dispatched</option>
            <option value="Cancelled">Cancelled</option>
          </select>
          <button class="btn btn-sm btn-outline-success" id="export-btn"><i class="bi bi-file-earmark-spreadsheet me-1"></i> Export CSV</button>
        </div>
      </div>

      <div class="mb-2 d-none" id="bulk-actions-container">
        <select id="bulk-action-select" class="form-select form-select-sm d-inline-block w-auto">
          <option value="">Bulk Actions...</option>
          <option value="Dispatched">Mark Dispatched</option>
        </select>
        <button class="btn btn-sm btn-primary" id="apply-bulk-btn">Apply</button>
      </div>

      <div class="table-responsive">
        <table class="table align-middle table-hover text-dark">
          <thead class="table-light">
            <tr>
              <th scope="col" style="width: 40px;"><input class="form-check-input" type="checkbox" id="select-all-cb"></th>
              <th scope="col" style="font-size:0.8rem; text-transform:uppercase;">Order #</th>
              <th scope="col" style="font-size:0.8rem; text-transform:uppercase;">Date</th>
              <th scope="col" style="font-size:0.8rem; text-transform:uppercase;">Customer</th>
              <th scope="col" style="font-size:0.8rem; text-transform:uppercase;">City</th>
              <th scope="col" style="font-size:0.8rem; text-transform:uppercase;">Products</th>
              <th scope="col" style="font-size:0.8rem; text-transform:uppercase;">Amount</th>
              <th scope="col" style="font-size:0.8rem; text-transform:uppercase;">Status</th>
              <th scope="col" style="font-size:0.8rem; text-transform:uppercase;">Actions</th>
            </tr>
          </thead>
          <tbody id="orders-table-body">
            <tr>
              <td colspan="9" class="text-center py-5 text-muted">
                <div class="spinner-border spinner-border-sm me-2 text-primary" role="status"></div> Loading live order feed...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
    import { auth, db } from "../js/firebase-init.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const userDisplay = document.getElementById("user-email-display");
    const tableBody = document.getElementById("orders-table-body");
    const logoutBtn = document.getElementById("logout-btn");

    // Stats elements
    const statSales = document.getElementById("stat-sales");
    const statPending = document.getElementById("stat-pending");
    const statDispatched = document.getElementById("stat-dispatched");
    const statWeight = document.getElementById("stat-weight");
    const statToday = document.getElementById("stat-today");
    const ordersCountBadge = document.getElementById("orders-count-badge");

    // Controls
    const searchInput = document.getElementById("search-input");
    const filterStatus = document.getElementById("filter-status");
    const exportBtn = document.getElementById("export-btn");
    const selectAllCb = document.getElementById("select-all-cb");
    const bulkActionsContainer = document.getElementById("bulk-actions-container");
    const bulkActionSelect = document.getElementById("bulk-action-select");
    const applyBulkBtn = document.getElementById("apply-bulk-btn");

    let allOrders = [];

    // Auth State Route Guard
    onAuthStateChanged(auth, (user) => {
      if (user) {
        if (user.email === "social.ahmro@gmail.com" || user.email.endsWith("@arbfarms.com")) {
          userDisplay.textContent = user.email;
          initializeDashboardFeed();
        } else {
          signOut(auth).then(() => {
            window.location.href = "../account.html";
          });
        }
      } else {
        window.location.href = "../account.html";
      }
    });

    logoutBtn.addEventListener("click", () => {
      signOut(auth).then(() => window.location.href = "../account.html");
    });

    // Realtime Database Feed
    function initializeDashboardFeed() {
      const ordersRef = collection(db, "orders");
      const q = query(ordersRef, orderBy("orderDate", "desc"));

      onSnapshot(q, (snapshot) => {
        if (snapshot.empty) {
          allOrders = [];
          renderTable();
          return;
        }
        allOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderTable();
      }, (err) => {
        console.warn("Firestore ordered snapshot query failed. Trying fallback query without orderBy. Error details:", err);
        const fallbackQ = query(ordersRef);
        onSnapshot(fallbackQ, (snapshot) => {
          allOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          allOrders.sort((a, b) => {
            const dateA = Date.parse(a.orderDate || 0) || 0;
            const dateB = Date.parse(b.orderDate || 0) || 0;
            if (dateA !== dateB) return dateB - dateA;
            return (b.orderNumber || '').localeCompare(a.orderNumber || '');
          });
          renderTable();
        }, (fallbackErr) => {
          console.error("Firestore fallback snapshot query also failed:", fallbackErr);
          tableBody.innerHTML = `<tr><td colspan="9" class="text-center py-5 text-danger">Database connection failed.</td></tr>`;
        });
      });
    }

    function renderTable() {
      const searchTerm = searchInput.value.toLowerCase().trim();
      const statusFilter = filterStatus.value;

      let filteredOrders = allOrders.filter(order => {
        let match = true;
        if (statusFilter) {
          // Map short status back to full if needed, or exact match
          match = (order.status === statusFilter) || 
                  (statusFilter === "Awaiting Verification" && order.status === "Awaiting Verification") ||
                  (statusFilter === "Verified & Processing" && order.status === "Verified & Processing");
        }
        if (match && searchTerm) {
          const textToSearch = `${order.orderNumber} ${order.customerName} ${order.phone} ${order.city}`.toLowerCase();
          match = textToSearch.includes(searchTerm);
        }
        return match;
      });

      let totalSalesVal = 0, pendingVal = 0, dispatchedVal = 0, totalWeightVal = 0, todayOrdersVal = 0;
      const todayString = new Date().toISOString().split('T')[0];

      if (filteredOrders.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="9" class="text-center py-5 text-muted">No orders found.</td></tr>`;
        updateStats(0, 0, 0, 0, 0, 0);
        return;
      }

      // Compute stats on allOrders to keep KPIs stable globally
      allOrders.forEach(order => {
        totalSalesVal += order.total || 0;
        if (order.status === "Awaiting Verification") pendingVal++;
        if (order.status === "Dispatched") dispatchedVal++;
        totalWeightVal += order.weight || 0;
        if (order.orderDate && order.orderDate.startsWith(todayString)) todayOrdersVal++;
      });
      updateStats(totalSalesVal, pendingVal, dispatchedVal, totalWeightVal, allOrders.length, todayOrdersVal);

      tableBody.innerHTML = filteredOrders.map(order => {
        let badgeClass = "bg-secondary";
        let shortStatus = order.status;
        if (order.status === "Awaiting Receipt") shortStatus = "Receipt";
        if (order.status === "Awaiting Verification") { badgeClass = "bg-warning text-dark"; shortStatus = "Verifying"; }
        if (order.status === "Verified & Processing") { badgeClass = "bg-info text-dark"; shortStatus = "Processing"; }
        if (order.status === "Dispatched") { badgeClass = "bg-success"; shortStatus = "Dispatched"; }
        if (order.status === "Cancelled") { badgeClass = "bg-danger"; shortStatus = "Cancelled"; }

        const itemsText = order.items && order.items.length > 0 
          ? order.items.map(item => `${item.qty}x ${item.name}`).join("<br>")
          : "No items";

        const orderDateFormatted = order.orderDate ? new Date(order.orderDate).toLocaleDateString() : "N/A";
        const receiptLink = order.receiptUrl 
          ? `<a href="${order.receiptUrl}" target="_blank" class="btn btn-xs btn-outline-primary py-1 px-2 small"><i class="bi bi-file-earmark-image"></i></a>`
          : `<span class="text-muted small">No receipt</span>`;

        return `
          <tr>
            <td><input class="form-check-input row-cb" type="checkbox" value="${order.id}"></td>
            <td><strong class="font-monospace text-primary">${order.orderNumber}</strong></td>
            <td class="small text-muted">${orderDateFormatted}</td>
            <td>
              <div class="fw-bold">${order.customerName}</div>
              <div class="text-muted small">+92 ${order.phone}</div>
            </td>
            <td><span class="text-uppercase small fw-semibold">${order.city}</span></td>
            <td class="small">${itemsText}</td>
            <td class="fw-semibold">Rs. ${(order.total || 0).toLocaleString()}</td>
            <td>
              <select class="form-select form-select-sm border-0 shadow-sm fw-bold ${badgeClass}" style="width:130px; font-size:0.75rem;" onchange="window.updateOrderStatus('${order.id}', this.value)">
                <option value="Awaiting Receipt" ${order.status === 'Awaiting Receipt' ? 'selected' : ''}>Receipt</option>
                <option value="Awaiting Verification" ${order.status === 'Awaiting Verification' ? 'selected' : ''}>Verifying</option>
                <option value="Verified & Processing" ${order.status === 'Verified & Processing' ? 'selected' : ''}>Processing</option>
                <option value="Dispatched" ${order.status === 'Dispatched' ? 'selected' : ''}>Dispatched</option>
                <option value="Cancelled" ${order.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
              </select>
            </td>
            <td>
              <div class="dropdown">
                <button class="btn btn-sm btn-light" type="button" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
                <ul class="dropdown-menu shadow-sm dropdown-menu-end">
                  ${order.receiptUrl ? `<li><a class="dropdown-item small" href="${order.receiptUrl}" target="_blank"><i class="bi bi-file-earmark-image me-2"></i>View Receipt</a></li>` : ''}
                  <li><hr class="dropdown-divider"></li>
                  <li><a class="dropdown-item small text-danger" href="#" onclick="window.deleteOrder('${order.id}')"><i class="bi bi-trash me-2"></i>Delete</a></li>
                </ul>
              </div>
            </td>
          </tr>
        `;
      }).join("");
      
      updateBulkActionsUI();
    }

    function updateStats(sales, pending, dispatched, weight, count, todayCount) {
      statSales.textContent = `Rs. ${sales.toLocaleString()}`;
      statPending.textContent = pending;
      statDispatched.textContent = dispatched;
      statWeight.textContent = `${weight.toFixed(2)} kg`;
      if(statToday) statToday.textContent = todayCount;
      ordersCountBadge.textContent = `${count} orders`;
    }

    // Export to CSV
    exportBtn.addEventListener("click", () => {
      if (allOrders.length === 0) return alert("No orders to export.");
      
      const csvRows = [];
      // Headers
      csvRows.push(["Order #", "Date", "Customer", "Phone", "City", "Amount", "Status", "Items"].join(","));
      
      allOrders.forEach(order => {
        const items = order.items ? order.items.map(i => `${i.qty}x ${i.name}`).join(" | ") : "";
        const row = [
          `"${order.orderNumber}"`,
          `"${order.orderDate || ''}"`,
          `"${order.customerName}"`,
          `"${order.phone}"`,
          `"${order.city}"`,
          order.total || 0,
          `"${order.status}"`,
          `"${items}"`
        ];
        csvRows.push(row.join(","));
      });
      
      const csvString = csvRows.join("\\n");
      const blob = new Blob([csvString], { type: "text/csv" });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.setAttribute("href", url);
      a.setAttribute("download", `orders_export_${new Date().toISOString().split('T')[0]}.csv`);
      a.click();
    });

    // Event Listeners for Filters
    searchInput.addEventListener("input", renderTable);
    filterStatus.addEventListener("change", renderTable);

    // Bulk Actions
    selectAllCb.addEventListener("change", (e) => {
      document.querySelectorAll(".row-cb").forEach(cb => cb.checked = e.target.checked);
      updateBulkActionsUI();
    });

    tableBody.addEventListener("change", (e) => {
      if (e.target.classList.contains("row-cb")) {
        updateBulkActionsUI();
      }
    });

    function updateBulkActionsUI() {
      const anyChecked = document.querySelectorAll(".row-cb:checked").length > 0;
      if (anyChecked) {
        bulkActionsContainer.classList.remove("d-none");
      } else {
        bulkActionsContainer.classList.add("d-none");
        selectAllCb.checked = false;
      }
    }

    applyBulkBtn.addEventListener("click", async () => {
      const selectedIds = Array.from(document.querySelectorAll(".row-cb:checked")).map(cb => cb.value);
      const action = bulkActionSelect.value;
      if (!action || selectedIds.length === 0) return;
      
      if (confirm(`Are you sure you want to change status to "${action}" for ${selectedIds.length} orders?`)) {
        for (const id of selectedIds) {
          const ref = doc(db, "orders", id);
          await updateDoc(ref, { status: action });
        }
        alert("Bulk action applied successfully.");
        selectAllCb.checked = false;
        bulkActionsContainer.classList.add("d-none");
      }
    });

    // Global hooks
    window.updateOrderStatus = function(orderId, newStatus) {
      const orderDocRef = doc(db, "orders", orderId);
      updateDoc(orderDocRef, { status: newStatus })
      .then(() => console.log("Order status updated."))
      .catch(err => alert("Error updating order status: " + err.message));
    };

    window.deleteOrder = function(orderId) {
      if(confirm("Are you sure you want to permanently delete this order?")) {
        deleteDoc(doc(db, "orders", orderId))
        .then(() => console.log("Order deleted."))
        .catch(err => alert("Error deleting order: " + err.message));
      }
    };
  </script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(registration => {
          console.log('ServiceWorker registration successful');
        }).catch(err => {
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
</body>
</html>
