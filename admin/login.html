<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal Login | ARB Farms Pakistan</title>
  <meta name="description" content="Secure portal login for ARB Farms administrators.">
  
  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  
  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }
    .login-card {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    .btn-admin {
      background: #2b422a;
      color: white;
      transition: all 0.3s ease;
    }
    .btn-admin:hover {
      background: #1e2e1d;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(43,66,42,0.3);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-md-6 col-lg-5">
        <div class="login-card p-4 p-md-5">
          
          <!-- Logo & Header -->
          <div class="text-center mb-4">
            <img src="catalog/arbfarms-logo-v2.svg" alt="ARB Farms" height="70" class="mb-3">
            <h2 class="h3 mb-2">Admin Portal</h2>
            <p class="text-muted">Sign in to manage your farm store</p>
          </div>

          <!-- Error Alert -->
          <div id="error-alert" class="alert alert-danger d-none" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span id="error-message"></span>
          </div>

          <!-- Success Alert -->
          <div id="success-alert" class="alert alert-success d-none" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span id="success-message"></span>
          </div>

          <!-- Login Form -->
          <form id="admin-login-form">
            <div class="mb-3">
              <label for="email" class="form-label fw-semibold">Email Address</label>
              <div class="input-group">
                <span class="input-group-text bg-white">
                  <i class="bi bi-envelope"></i>
                </span>
                <input type="email" class="form-control form-control-lg" id="email" 
                       placeholder="admin@arbfarms.com" required autocomplete="email">
              </div>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-white">
                  <i class="bi bi-lock"></i>
                </span>
                <input type="password" class="form-control form-control-lg" id="password" 
                       placeholder="Enter your password" required autocomplete="current-password">
              </div>
            </div>

            <button type="submit" class="btn btn-admin btn-lg w-100" id="login-btn">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
          </form>

          <hr class="my-4">

          <div class="text-center">
            <small class="text-muted">
              <i class="bi bi-shield-lock"></i> Secure admin access only
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>

  <script type="module">
    // Initialize Firebase
    import { initializeApp } from "firebase/app";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "firebase/auth";
    import { getFirestore, doc, getDoc } from "firebase/firestore";

    // Your Firebase configuration
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM Elements
    const form = document.getElementById('admin-login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const errorAlert = document.getElementById('error-alert');
    const errorMessage = document.getElementById('error-message');
    const successAlert = document.getElementById('success-alert');
    const successMessage = document.getElementById('success-message');

    // Check if already logged in
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        console.log('User already logged in:', user.email);
        
        // Check if user is admin
        const isAdmin = await checkIfAdmin(user);
        
        if (isAdmin) {
          console.log('Already admin, redirecting to dashboard');
          window.location.href = 'admin/dashboard.html';
        } else {
          console.log('Not admin, signing out');
          await signOut(auth);
        }
      }
    });

    // Function to check if user is admin
    async function checkIfAdmin(user) {
      if (!user) return false;
      
      // Method 1: Check email whitelist
      const adminEmails = [
        'social.ahmro@gmail.com',
        'admin@arbfarms.com',
        'manager@arbfarms.com'
      ];
      
      if (adminEmails.includes(user.email) || user.email.endsWith('@arbfarms.com')) {
        console.log('Admin verified by email whitelist');
        return true;
      }
      
      // Method 2: Check Firestore role
      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists() && userDoc.data().role === 'admin') {
          console.log('Admin verified by Firestore role');
          return true;
        }
      } catch (error) {
        console.log('Firestore check failed:', error);
      }
      
      return false;
    }

    // Show error message
    function showError(message) {
      errorMessage.textContent = message;
      errorAlert.classList.remove('d-none');
      successAlert.classList.add('d-none');
      
      // Auto hide after 5 seconds
      setTimeout(() => {
        errorAlert.classList.add('d-none');
      }, 5000);
    }

    // Show success message
    function showSuccess(message) {
      successMessage.textContent = message;
      successAlert.classList.remove('d-none');
      errorAlert.classList.add('d-none');
      
      // Auto hide after 3 seconds
      setTimeout(() => {
        successAlert.classList.add('d-none');
      }, 3000);
    }

    // Handle form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Hide any previous alerts
      errorAlert.classList.add('d-none');
      successAlert.classList.add('d-none');
      
      // Get values
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      
      // Validate
      if (!email || !password) {
        showError('Please enter both email and password');
        return;
      }
      
      // Disable button and show loading
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span>Signing In...';
      
      console.log('Attempting login for:', email);
      
      try {
        // Attempt sign in
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        console.log('Login successful for:', user.email);
        showSuccess('Login successful! Verifying admin access...');
        
        // Check if user is admin
        const isAdmin = await checkIfAdmin(user);
        
        if (isAdmin) {
          console.log('Admin verified, redirecting to dashboard');
          showSuccess('Admin verified! Redirecting to dashboard...');
          
          // Small delay to show success message
          setTimeout(() => {
            window.location.href = 'admin/dashboard.html';
          }, 1000);
        } else {
          console.log('Not an admin account');
          await signOut(auth);
          showError('Access Denied: This account does not have admin privileges.');
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Sign In';
        }
        
      } catch (error) {
        console.error('Login error:', error.code, error.message);
        
        // Handle specific error codes
        switch (error.code) {
          case 'auth/invalid-credential':
          case 'auth/wrong-password':
          case 'auth/user-not-found':
            showError('Invalid email or password. Please try again.');
            break;
          case 'auth/too-many-requests':
            showError('Too many failed attempts. Please try again later.');
            break;
          case 'auth/network-request-failed':
            showError('Network error. Please check your internet connection.');
            break;
          default:
            showError('Login failed: ' + error.message);
        }
        
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Sign In';
      }
    });

    // Add password show/hide toggle (optional)
    const addPasswordToggle = () => {
      const passwordField = document.getElementById('password');
      const toggleBtn = document.createElement('button');
      toggleBtn.type = 'button';
      toggleBtn.className = 'btn btn-outline-secondary';
      toggleBtn.innerHTML = '<i class="bi bi-eye"></i>';
      toggleBtn.style.position = 'absolute';
      toggleBtn.style.right = '10px';
      toggleBtn.style.top = '50%';
      toggleBtn.style.transform = 'translateY(-50%)';
      
      const wrapper = passwordField.parentElement;
      wrapper.style.position = 'relative';
      wrapper.appendChild(toggleBtn);
      
      toggleBtn.addEventListener('click', () => {
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        toggleBtn.innerHTML = type === 'password' ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
      });
    };
    
    // Uncomment to add password toggle
    // addPasswordToggle();
  </script>
</body>
</html>
