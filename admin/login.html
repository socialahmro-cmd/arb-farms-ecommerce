<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal Login | ARB Farms Pakistan</title>
  
  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  
  <!-- Custom Styles -->
  <link href="../css/index.css?v=3ffba108" rel="stylesheet">
  
  <style>
    body {
      background: linear-gradient(135deg, #1e331b 0%, #365733 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-width: 420px;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="container p-3">
    <div class="login-card mx-auto p-4 p-sm-5">
      <div class="text-center mb-4">
        <img src="../catalog/arbfarms-logo.svg" alt="ARB Farms Logo" style="height: 60px;" class="mb-3">
        <h1 class="h4 font-primary text-primary mb-1">Admin Portal</h1>
        <p class="text-muted small">Sign in with an authorized email to manage orders</p>
      </div>

      <div class="alert alert-danger d-none" id="login-error-alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> <span id="error-message"></span>
      </div>

      <form id="login-form" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label fw-bold text-dark">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label fw-bold text-dark">Password</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2.5 font-primary text-uppercase" id="login-btn">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script type="module">
    import { auth } from "../js/firebase-init.js";
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const form = document.getElementById("login-form");
    const errorAlert = document.getElementById("login-error-alert");
    const errorMessage = document.getElementById("error-message");
    const submitBtn = document.getElementById("login-btn");

    function showError(msg) {
      errorMessage.textContent = msg;
      errorAlert.classList.remove("d-none");
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      errorAlert.classList.add("d-none");

      if (!form.checkValidity()) {
        form.classList.add("was-validated");
        return;
      }

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Signing In...';
      submitBtn.disabled = true;

      signInWithEmailAndPassword(auth, email, password)
        .then(async (userCredential) => {
          const user = userCredential.user;
          // Validate authorization check
          if (user.email === "social.ahmro@gmail.com" || user.email.endsWith("@arbfarms.com")) {
            window.location.href = "dashboard.html";
          } else {
            await auth.signOut();
            showError("Access Denied: This account is not authorized.");
            submitBtn.innerHTML = "Sign In";
            submitBtn.disabled = false;
          }
        })
        .catch((error) => {
          console.error("Login failed:", error);
          showError("Invalid email or password. Please try again.");
          submitBtn.innerHTML = "Sign In";
          submitBtn.disabled = false;
        });
    });
  </script>
</body>
</html>
