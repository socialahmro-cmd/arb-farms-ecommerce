<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal Login | ARB Farms Pakistan</title>
  
  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .login-card {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    .btn-admin {
      background: #2b422a;
      color: white;
      transition: all 0.3s ease;
    }
    .btn-admin:hover {
      background: #1e2e1d;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-md-6 col-lg-5">
        <div class="login-card p-4 p-md-5">
          
          <div class="text-center mb-4">
            <img src="../catalog/arbfarms-logo-v2.svg" alt="ARB Farms" height="70" class="mb-3">
            <h2 class="h3 mb-2">Admin Portal</h2>
            <p class="text-muted">Sign in to manage your farm store</p>
          </div>

          <div id="error-alert" class="alert alert-danger d-none" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span id="error-message"></span>
          </div>

          <form id="login-form">
            <div class="mb-3">
              <label for="email" class="form-label fw-semibold">Email Address</label>
              <input type="email" class="form-control form-control-lg" id="email" 
                     placeholder="social.ahmro@gmail.com" required>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label fw-semibold">Password</label>
              <input type="password" class="form-control form-control-lg" id="password" 
                     placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-admin btn-lg w-100" id="login-btn">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
          </form>

          <hr class="my-4">
          <div class="text-center">
            <small class="text-muted">
              <i class="bi bi-shield-lock"></i> Authorized admin access only
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    // IMPORTANT: Path goes UP one level because we're in admin folder
    import { auth } from "../js/firebase-init.js";
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const errorAlert = document.getElementById('error-alert');
    const errorMessage = document.getElementById('error-message');

    function showError(msg) {
      errorMessage.textContent = msg;
      errorAlert.classList.remove('d-none');
      setTimeout(() => errorAlert.classList.add('d-none'), 5000);
    }

    // Check if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) {
        console.log('Already logged in:', user.email);
        if (user.email === "social.ahmro@gmail.com" || user.email.endsWith("@arbfarms.com")) {
          window.location.href = "dashboard.html";
        }
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      errorAlert.classList.add('d-none');
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      
      if (!email || !password) {
        showError('Please enter both email and password');
        return;
      }
      
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing In...';
      
      console.log('Attempting login for:', email);
      
      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        console.log('Login successful for:', user.email);
        
        // Check if admin
        if (user.email === "social.ahmro@gmail.com" || user.email.endsWith("@arbfarms.com")) {
          console.log('Admin verified, redirecting to dashboard');
          window.location.href = "dashboard.html";
        } else {
          console.log('Not an admin account');
          showError('Access Denied: This account is not authorized as admin.');
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Sign In';
        }
        
      } catch (error) {
        console.error('Login error:', error.code, error.message);
        
        if (error.code === 'auth/invalid-credential') {
          showError('Invalid email or password. Please try again.');
        } else if (error.code === 'auth/user-not-found') {
          showError('No account found with this email.');
        } else if (error.code === 'auth/wrong-password') {
          showError('Wrong password. Please try again.');
        } else if (error.code === 'auth/too-many-requests') {
          showError('Too many failed attempts. Please try again later.');
        } else {
          showError('Login failed: ' + error.message);
        }
        
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Sign In';
      }
    });
  </script>
</body>
</html>
