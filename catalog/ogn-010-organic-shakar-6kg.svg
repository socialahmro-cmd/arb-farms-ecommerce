<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdfaf4" />
      <stop offset="100%" stop-color="#ede1ca" />
    </linearGradient>
    
    <!-- Honey Amber Gradient -->
    <linearGradient id="honeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59018" />
      <stop offset="50%" stop-color="#d4700c" />
      <stop offset="100%" stop-color="#803f00" />
    </linearGradient>
    
    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#121912" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Outer Box -->
  <rect width="500" height="500" rx="20" fill="url(#bgGrad)"/>
  <rect x="15" y="15" width="470" height="470" rx="15" fill="none" stroke="#365733" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.4"/>
  
  <!-- Main Graphic -->
  <g filter="url(#shadow)">
    
        <!-- Organic Shakar Jar/Bowl -->
        <g transform="translate(150, 100)">
          <!-- Wooden/Clay Pot Shape -->
          <path d="M30,120 C30,70 170,70 170,120 C170,190 150,220 100,220 C50,220 30,190 30,120 Z" fill="#b08051" stroke="#805b35" stroke-width="2" />
          <ellipse cx="100" cy="90" rx="70" ry="15" fill="#e0c5a8" />
          <!-- Shakar grains in bowl -->
          <ellipse cx="100" cy="90" rx="55" ry="10" fill="#dfbe7e" />
          <circle cx="90" cy="88" r="1.5" fill="#805b35" /><circle cx="110" cy="92" r="2" fill="#805b35" /><circle cx="100" cy="86" r="1" fill="#805b35" />
          <!-- Label -->
          <!-- ARB Organics Mini Badge Label -->
          <g transform="translate(100.0,155.0)">
            <!-- Outer cream fill + dark green ring -->
            <circle cx="0" cy="0" r="30.0" fill="#ede2cb" stroke="#526e4a" stroke-width="1.5"/>
            <!-- Inner gold ring -->
            <circle cx="0" cy="0" r="28.1" fill="none" stroke="#b29158" stroke-width="1.0"/>

            <!-- Symmetrical Leaves at the Top -->
            <g fill="#33522f">
              <!-- Left Leaf -->
              <path d="M -1.0,-12.8 C -5.1,-12.8 -11.2,-15.6 -11.2,-22.3 C -4.9,-22.3 -1.7,-17.6 -1.0,-12.8 Z" />
              <path d="M -1.0,-12.8 Q -5.1,-15.6 -8.0,-19.5" stroke="#ede2cb" stroke-width="0.5" fill="none" stroke-linecap="round" />

              <!-- Right Leaf -->
              <path d="M 1.0,-12.8 C 5.1,-12.8 11.2,-15.6 11.2,-22.3 C 4.9,-22.3 1.7,-17.6 1.0,-12.8 Z" />
              <path d="M 1.0,-12.8 Q 5.1,-15.6 8.0,-19.5" stroke="#ede2cb" stroke-width="0.5" fill="none" stroke-linecap="round" />
            </g>

            <!-- 100% NATURAL -->
            <text x="0" y="-7.4" font-family="'Impact','Arial Black','Outfit',sans-serif" font-size="4.0" font-weight="900" fill="#33522f" text-anchor="middle" letter-spacing="0.1">100% NATURAL</text>

            <!-- ARB large text -->
            <text x="0" y="4.1" font-family="'Times New Roman','Lora','Georgia',serif" font-size="15.1" font-weight="900" fill="#000000" text-anchor="middle" letter-spacing="-1">ARB</text>

            <!-- ORGANICS -->
            <text x="0" y="10.7" font-family="'Times New Roman','Lora','Georgia',serif" font-size="5.4" font-weight="bold" fill="#33522f" text-anchor="middle" letter-spacing="1">ORGANICS</text>

            <!-- Curved bottom text "Your Organic Food store" -->
            <defs>
              <path id="arc_100_155" d="M -23.0,6.4 A 24.9,24.9 0 0,0 23.0,6.4" fill="none"/>
            </defs>
            <text font-family="'Arial','Helvetica','Inter',sans-serif" font-size="4.2" font-weight="bold" fill="#111111">
              <textPath href="#arc_100_155" startOffset="50%" text-anchor="middle">Your Organic Food store</textPath>
            </text>
          </g>
          
          
        </g>
        
  </g>
  
  <!-- Content Labels -->
  <text x="250" y="425" font-family="'Outfit', sans-serif" font-size="20" font-weight="bold" fill="#365733" text-anchor="middle">ORGANIC SHAKAR</text>
  <text x="250" y="450" font-family="'Lora', serif" font-size="14" font-style="italic" fill="#b5925e" text-anchor="middle">Weight: 6 Kg &#8226; SKU: OGN-010</text>
  <text x="250" y="472" font-family="'Inter', sans-serif" font-size="12" fill="#5a6459" text-anchor="middle">Price: Rs. 4,400 &#8226; Sourced by ARB Farms</text>
</svg>
