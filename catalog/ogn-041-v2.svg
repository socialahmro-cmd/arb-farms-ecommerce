<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdfaf4" />
      <stop offset="100%" stop-color="#ede1ca" />
    </linearGradient>
    <!-- Card Border Green -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#365733" />
      <stop offset="100%" stop-color="#1e331c" />
    </linearGradient>
    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#121912" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Outer Box -->
  <rect width="500" height="500" rx="20" fill="url(#bgGrad)"/>
  <rect x="15" y="15" width="470" height="470" rx="15" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.4"/>
  
  <!-- Illustration with Shadow -->
  <g filter="url(#shadow)">
    
        <!-- Silage Bale Block -->
        <g transform="translate(160, 110)">
          <!-- Bale body -->
          <polygon points="20,80 140,50 160,150 40,180" fill="#7ba348" stroke="#486126" stroke-width="2" />
          <polygon points="140,50 160,150 170,110 150,20" fill="#5c7c32" stroke="#486126" stroke-width="2" />
          <polygon points="20,80 140,50 150,20 30,50" fill="#90c253" stroke="#486126" stroke-width="2" />
          <!-- Wrapping bands -->
          <line x1="60" y1="70" x2="80" y2="170" stroke="#ffffff" stroke-width="5" opacity="0.6" />
          <line x1="100" y1="60" x2="120" y2="160" stroke="#ffffff" stroke-width="5" opacity="0.6" />
          <!-- Leaf / Feed Details -->
          <path d="M40,110 Q50,105 60,110 M70,130 Q80,125 90,130" stroke="#365733" stroke-width="2" fill="none" />
        </g>
        
  </g>
  
  <!-- Label Overlay -->
  <rect x="80" y="27" width="340" height="40" rx="20" fill="#365733" opacity="0.9" />
  <text x="250" y="52" font-family="'Outfit', sans-serif" font-size="14" font-weight="bold" fill="#ede1ca" text-anchor="middle" letter-spacing="2">ARB ORGANICS &#8226; AGRI FEED</text>
  
  <!-- Content Labels -->
  <text x="250" y="420" font-family="'Outfit', sans-serif" font-size="20" font-weight="bold" fill="#365733" text-anchor="middle">SILAGE</text>
  <text x="250" y="445" font-family="'Lora', serif" font-size="14" font-style="italic" fill="#b5925e" text-anchor="middle">Weight: 40 Kg &#8226; SKU: OGN-041</text>
  <text x="250" y="470" font-family="'Inter', sans-serif" font-size="12" fill="#5a6459" text-anchor="middle">Price: Rs. 900 &#8226; Sourced by ARB Farms</text>
</svg>
