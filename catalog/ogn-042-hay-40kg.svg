<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdfaf4" />
      <stop offset="100%" stop-color="#ede1ca" />
    </linearGradient>
    <!-- Card Border Green -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#365733" />
      <stop offset="100%" stop-color="#1e331c" />
    </linearGradient>
    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#121912" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Outer Box -->
  <rect width="500" height="500" rx="20" fill="url(#bgGrad)"/>
  <rect x="15" y="15" width="470" height="470" rx="15" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.4"/>
  
  <!-- Illustration with Shadow -->
  <g filter="url(#shadow)">
    
        <!-- Hay Round Roll Bale -->
        <g transform="translate(150, 110)">
          <!-- Shadow side of cylinder -->
          <path d="M40,50 L120,50 A40,40 0 0,1 120,130 L40,130 A40,40 0 0,1 40,50 Z" fill="#bfa16b" stroke="#876f44" stroke-width="2" />
          <!-- Side face (Flat circle face of roll) -->
          <ellipse cx="40" cy="90" rx="35" ry="40" fill="#dfbe7e" stroke="#876f44" stroke-width="2" />
          <!-- Concentric rings on flat face representing rolled hay -->
          <ellipse cx="40" cy="90" rx="27" ry="31" fill="none" stroke="#876f44" stroke-width="1.5" stroke-dasharray="8,4" />
          <ellipse cx="40" cy="90" rx="19" ry="22" fill="none" stroke="#876f44" stroke-width="1.5" stroke-dasharray="6,3" />
          <ellipse cx="40" cy="90" rx="10" ry="12" fill="none" stroke="#876f44" stroke-width="1.5" />
          <!-- Texture details on cylinder body -->
          <path d="M60,55 C70,60 90,55 110,60 M65,80 C75,85 85,80 115,83 M58,105 C72,110 88,105 108,110 M50,122 C65,125 80,123 105,125" fill="none" stroke="#876f44" stroke-width="1.5" opacity="0.6" />
        </g>
        
  </g>
  
  <!-- Label Overlay -->
  <rect x="80" y="27" width="340" height="40" rx="20" fill="#365733" opacity="0.9" />
  <text x="250" y="52" font-family="'Outfit', sans-serif" font-size="14" font-weight="bold" fill="#ede1ca" text-anchor="middle" letter-spacing="2">ARB ORGANICS &#8226; AGRI FEED</text>
  
  <!-- Content Labels -->
  <text x="250" y="420" font-family="'Outfit', sans-serif" font-size="20" font-weight="bold" fill="#365733" text-anchor="middle">HAY</text>
  <text x="250" y="445" font-family="'Lora', serif" font-size="14" font-style="italic" fill="#b5925e" text-anchor="middle">Weight: 40 Kg &#8226; SKU: OGN-042</text>
  <text x="250" y="470" font-family="'Inter', sans-serif" font-size="12" fill="#5a6459" text-anchor="middle">Price: Rs. 5,400 &#8226; Sourced by ARB Farms</text>
</svg>
