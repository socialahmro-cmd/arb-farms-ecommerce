<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Background Dark Green -->
  <rect width="500" height="500" rx="20" fill="#365733"/>
  <rect x="15" y="15" width="470" height="470" rx="15" fill="none" stroke="#b5925e" stroke-width="2"/>
  <rect x="22" y="22" width="456" height="456" rx="12" fill="none" stroke="#b5925e" stroke-width="0.5" opacity="0.6"/>
  
  <!-- Ribbon header -->
  <path d="M100,40 L400,40 L380,80 L120,80 Z" fill="#b5925e" />
  <text x="250" y="65" font-family="'Outfit', sans-serif" font-size="16" font-weight="bold" fill="#365733" text-anchor="middle" letter-spacing="3">BENEFITS &amp; USAGE</text>
  
  <!-- Product Title -->
  <text x="250" y="130" font-family="'Outfit', sans-serif" font-size="22" font-weight="bold" fill="#ede1ca" text-anchor="middle">OKRA SEED (RETAIL)</text>
  <text x="250" y="155" font-family="'Lora', serif" font-size="14" font-style="italic" fill="#b5925e" text-anchor="middle">Category: Vegetable Crop &#8226; 1 Kg</text>
  
  <!-- Separation line -->
  <line x1="100" y1="195" x2="400" y2="195" stroke="#ede1ca" stroke-width="1" opacity="0.3"/>
  
  <!-- Bullet 1 -->
  <g transform="translate(50, 205)">
    <circle cx="20" cy="15" r="8" fill="#b5925e"/>
    <path d="M16,15 L19,18 L24,12" fill="none" stroke="#365733" stroke-width="2" stroke-linecap="round"/>
    <text x="40" y="20" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Highly productive warm-season crop</text>
  </g>
  
  <!-- Bullet 2 -->
  <g transform="translate(50, 260)">
    <circle cx="20" cy="15" r="8" fill="#b5925e"/>
    <path d="M16,15 L19,18 L24,12" fill="none" stroke="#365733" stroke-width="2" stroke-linecap="round"/>
    <text x="40" y="20" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Produces tender, high-mucilage green pods</text>
  </g>
  
  <!-- Bullet 3 -->
  <g transform="translate(50, 315)">
    <circle cx="20" cy="15" r="8" fill="#b5925e"/>
    <path d="M16,15 L19,18 L24,12" fill="none" stroke="#365733" stroke-width="2" stroke-linecap="round"/>
    <text x="40" y="20" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Continuous harvest over summer months</text>
  </g>
  
  <!-- Bottom note -->
  <rect x="60" y="375" width="380" height="55" rx="8" fill="#1e331c" stroke="#b5925e" stroke-width="1" />
  <text x="250" y="395" font-family="'Inter', sans-serif" font-size="12" fill="#ede1ca" text-anchor="middle" font-weight="bold">Ideal Sowing Season &amp; Depth:</text>
  <text x="250" y="415" font-family="'Inter', sans-serif" font-size="12" fill="#b5925e" text-anchor="middle">Feb - Apr / Jun - Jul | 0.75 inches deep</text>
  
  <!-- Brand stamp -->
  <text x="250" y="465" font-family="'Outfit', sans-serif" font-size="11" font-weight="bold" fill="#b5925e" text-anchor="middle" letter-spacing="4">ARB FARMS &#8226; 100% PURE</text>
</svg>