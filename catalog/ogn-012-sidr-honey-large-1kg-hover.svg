<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Background Dark Green -->
  <rect width="500" height="500" rx="20" fill="#365733"/>
  <rect x="15" y="15" width="470" height="470" rx="15" fill="none" stroke="#b5925e" stroke-width="2"/>
  <rect x="22" y="22" width="456" height="456" rx="12" fill="none" stroke="#b5925e" stroke-width="0.5" opacity="0.6"/>
  
  <!-- Ribbon header -->
  <path d="M120,40 L380,40 L360,80 L140,80 Z" fill="#b5925e" />
  <text x="250" y="65" font-family="'Outfit', sans-serif" font-size="16" font-weight="bold" fill="#365733" text-anchor="middle" letter-spacing="3">BENEFITS &amp; INFO</text>
  
  <!-- Product Title -->
  <text x="250" y="140" font-family="'Outfit', sans-serif" font-size="24" font-weight="bold" fill="#ede1ca" text-anchor="middle">SIDR HONEY</text>
  <text x="250" y="165" font-family="'Lora', serif" font-size="14" font-style="italic" fill="#b5925e" text-anchor="middle">PREMIUM HONEY &#8226; 1 Kg</text>
  
  <!-- Separation line -->
  <line x1="100" y1="195" x2="400" y2="195" stroke="#ede1ca" stroke-width="1" opacity="0.3"/>
  
  <!-- Bullet 1 -->
  <g transform="translate(60, 220)">
    <circle cx="20" cy="15" r="8" fill="#b5925e"/>
    <path d="M16,15 L19,18 L24,12" fill="none" stroke="#365733" stroke-width="2" stroke-linecap="round"/>
    <text x="40" y="20" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">100% pure wild-harvested Sidr Honey</text>
  </g>
  
  <!-- Bullet 2 -->
  <g transform="translate(60, 275)">
    <circle cx="20" cy="15" r="8" fill="#b5925e"/>
    <path d="M16,15 L19,18 L24,12" fill="none" stroke="#365733" stroke-width="2" stroke-linecap="round"/>
    <text x="40" y="20" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Strong natural antibacterial properties</text>
  </g>
  
  <!-- Bullet 3 -->
  <g transform="translate(60, 330)">
    <circle cx="20" cy="15" r="8" fill="#b5925e"/>
    <path d="M16,15 L19,18 L24,12" fill="none" stroke="#365733" stroke-width="2" stroke-linecap="round"/>
    <text x="40" y="20" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Boosts immunity &amp; heals sore throat</text>
  </g>
  
  <!-- Bottom note -->
  <rect x="80" y="390" width="340" height="45" rx="8" fill="#263d24" />
  <text x="250" y="416" font-family="'Inter', sans-serif" font-size="11" fill="#ede1ca" text-anchor="middle">Sourced directly from our organic farm in Multan</text>
  
  <!-- Brand stamp -->
  <text x="250" y="465" font-family="'Outfit', sans-serif" font-size="11" font-weight="bold" fill="#b5925e" text-anchor="middle" letter-spacing="4">ARB FARMS &#8226; 100% PURE</text>
</svg>
