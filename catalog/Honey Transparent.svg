<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <!-- Jar glass gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="80%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e0e0e0" stop-opacity="0.5"/>
    </linearGradient>
    
    <!-- Honey gradient -->
    <linearGradient id="honeyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>

    <!-- Wood dipper gradient -->
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D7CCC8"/>
      <stop offset="50%" stop-color="#B0BEC5"/>
      <stop offset="100%" stop-color="#8D6E63"/>
    </linearGradient>
    <linearGradient id="dipperWood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A76D43"/>
      <stop offset="100%" stop-color="#794C2B"/>
    </linearGradient>
    
    <!-- Honey highlight -->
    <linearGradient id="honeyHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF9C4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0.1"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="50" cy="55" r="35" fill="#FFFDE7" opacity="0.7"/>

  <!-- Honeycomb Pattern Background (subtle) -->
  <g opacity="0.08" stroke="#FFB300" stroke-width="0.5" fill="none">
    <path d="M 50 15 l 5 -3 l 5 3 l 0 6 l -5 3 l -5 -3 z"/>
    <path d="M 60 21 l 5 -3 l 5 3 l 0 6 l -5 3 l -5 -3 z"/>
    <path d="M 40 21 l 5 -3 l 5 3 l 0 6 l -5 3 l -5 -3 z"/>
    <path d="M 50 27 l 5 -3 l 5 3 l 0 6 l -5 3 l -5 -3 z"/>
  </g>

  <!-- JAR SHADOW -->
  <ellipse cx="50" cy="85" rx="22" ry="6" fill="#757575" opacity="0.12"/>
  
  <!-- THE HONEY INSIDE THE JAR -->
  <path d="M 33 42 Q 33 35 38 35 L 62 35 Q 67 35 67 42 L 69 70 Q 69 82 50 82 Q 31 82 31 70 Z" fill="url(#honeyGrad)" />
  
  <!-- Honey ripples/details inside -->
  <path d="M 32 55 Q 50 58 68 55 L 69 70 Q 69 82 50 82 Q 31 82 31 70 Z" fill="#E65100" opacity="0.15" />
  <path d="M 35 40 Q 50 43 65 40 Q 66 50 66 60 Q 50 63 34 60 Z" fill="url(#honeyHighlight)" opacity="0.4" />

  <!-- GLASS JAR BODY -->
  <path d="M 33 30 Q 33 26 38 26 L 62 26 Q 67 26 67 30 L 67 33 L 33 33 Z" fill="url(#glassGrad)" />
  <path d="M 33 33 Q 33 35 38 35 L 62 35 Q 67 35 67 33 Z" fill="none" stroke="#E0E0E0" stroke-width="0.7" />
  <path d="M 33 42 Q 33 35 38 35 L 62 35 Q 67 35 67 42 L 69 70 Q 69 82 50 82 Q 31 82 31 70 Z" fill="url(#glassGrad)" stroke="#FFFFFF" stroke-width="0.8" />
  
  <!-- Jar Rim and Neck -->
  <rect x="36" y="21" width="28" height="5" rx="1.5" fill="url(#glassGrad)" stroke="#E0E0E0" stroke-width="0.5"/>
  
  <!-- JAR LID (Wooden Metal Lid) -->
  <g filter="url(#dropShadow)">
    <rect x="35" y="16" width="30" height="6" rx="2" fill="url(#dipperWood)" />
    <!-- Lid lines / texture -->
    <line x1="39" y1="16" x2="39" y2="22" stroke="#5D4037" stroke-width="0.5" />
    <line x1="43" y1="16" x2="43" y2="22" stroke="#5D4037" stroke-width="0.5" />
    <line x1="47" y1="16" x2="47" y2="22" stroke="#5D4037" stroke-width="0.5" />
    <line x1="51" y1="16" x2="51" y2="22" stroke="#5D4037" stroke-width="0.5" />
    <line x1="55" y1="16" x2="55" y2="22" stroke="#5D4037" stroke-width="0.5" />
    <line x1="59" y1="16" x2="59" y2="22" stroke="#5D4037" stroke-width="0.5" />
    <line x1="63" y1="16" x2="63" y2="22" stroke="#5D4037" stroke-width="0.5" />
  </g>

  <!-- JAR LABEL -->
  <g filter="url(#dropShadow)">
    <!-- Label Background -->
    <path d="M 35 48 L 65 48 Q 67 58 65 68 L 35 68 Q 33 58 35 48 Z" fill="#FFFDE7" stroke="#FFD54F" stroke-width="0.8" />
    <!-- Label Border -->
    <path d="M 37 50 L 63 50 Q 64.5 58 63 66 L 37 66 Q 35.5 58 37 50 Z" fill="none" stroke="#FFB300" stroke-width="0.4" stroke-dasharray="1,1" />
    <!-- Honey Bee Icon on Label -->
    <ellipse cx="50" cy="56" rx="3" ry="2" fill="#FFD54F"/>
    <path d="M 48 55 Q 50 52 52 55" fill="none" stroke="#3E2723" stroke-width="0.5"/>
    <!-- Wings -->
    <ellipse cx="49" cy="53" rx="1" ry="2" fill="#E0F7FA" opacity="0.8" transform="rotate(-30 49 53)"/>
    <ellipse cx="51" cy="53" rx="1" ry="2" fill="#E0F7FA" opacity="0.8" transform="rotate(30 51 53)"/>
    <!-- Text "HONEY" -->
    <text x="50" y="64" font-family="'Inter', sans-serif" font-size="3.5" font-weight="bold" fill="#5D4037" text-anchor="middle" letter-spacing="0.5">HONEY</text>
  </g>

  <!-- HONEY DIPPER (Leaning against the jar) -->
  <g transform="rotate(15 72 65)" filter="url(#dropShadow)">
    <!-- Stick -->
    <rect x="71" y="20" width="2" height="45" rx="0.5" fill="url(#dipperWood)" />
    <!-- Dipper Head -->
    <rect x="68" y="55" width="8" height="12" rx="2" fill="url(#dipperWood)" />
    <!-- Grooves on Dipper -->
    <line x1="67" y1="57" x2="77" y2="57" stroke="#5D4037" stroke-width="1" />
    <line x1="67" y1="60" x2="77" y2="60" stroke="#5D4037" stroke-width="1" />
    <line x1="67" y1="63" x2="77" y2="63" stroke="#5D4037" stroke-width="1" />
    <line x1="67" y1="66" x2="77" y2="66" stroke="#5D4037" stroke-width="1" />
    <!-- Top round knob -->
    <circle cx="72" cy="19" r="1.5" fill="url(#dipperWood)" />
    
    <!-- Honey dripping from the dipper -->
    <path d="M 68 64 Q 72 67 76 64 C 76 68 74 72 72 72 C 70 72 68 68 68 64 Z" fill="#FFB300" opacity="0.9" />
    <circle cx="72" cy="74" r="1" fill="#FFB300" opacity="0.9"/>
  </g>

  <!-- LITTLE BEE FLYING -->
  <g transform="translate(18, 25) scale(0.9)">
    <!-- Bee Body -->
    <ellipse cx="10" cy="10" rx="3.5" ry="2.2" fill="#FFB300" transform="rotate(-15 10 10)"/>
    <!-- Stripes -->
    <path d="M 9.5 8 L 8.5 12" stroke="#3E2723" stroke-width="0.8"/>
    <path d="M 11.5 8 L 10.5 12" stroke="#3E2723" stroke-width="0.8"/>
    <!-- Stinger -->
    <path d="M 6.5 10 L 5.5 10" stroke="#3E2723" stroke-width="0.5"/>
    <!-- Wings -->
    <ellipse cx="9" cy="6.5" rx="1.2" ry="2.5" fill="#E0F7FA" opacity="0.8" transform="rotate(-40 9 6.5)"/>
    <ellipse cx="11.5" cy="7.2" rx="1" ry="2.2" fill="#E0F7FA" opacity="0.8" transform="rotate(-10 11.5 7.2)"/>
    <!-- Flight Path (subtle dashed line) -->
    <path d="M -3 18 Q 4 17 8 13" fill="none" stroke="#BDBDBD" stroke-width="0.5" stroke-dasharray="1,1"/>
  </g>
</svg>