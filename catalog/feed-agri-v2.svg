<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdfaf4" />
      <stop offset="100%" stop-color="#ede1ca" />
    </linearGradient>
    <!-- Sack Body Gradient -->
    <linearGradient id="sackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3c28f" />
      <stop offset="100%" stop-color="#ad8d58" />
    </linearGradient>
    <!-- Brand Gold -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b5925e" />
      <stop offset="100%" stop-color="#806232" />
    </linearGradient>
    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#121912" flood-opacity="0.12" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="500" rx="20" fill="url(#bgGrad)"/>
  <rect x="15" y="15" width="470" height="470" rx="15" fill="none" stroke="#365733" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.4"/>
  
  <!-- Feed Sack Graphic -->
  <g filter="url(#shadow)" transform="translate(150, 100)">
    <!-- Sack Top Fold -->
    <path d="M30,50 Q100,30 170,50 L180,75 Q100,60 20,75 Z" fill="#b0905a" stroke="#806232" stroke-width="1"/>
    
    <!-- Sack Tie Rope -->
    <rect x="25" y="70" width="150" height="8" rx="4" fill="#365733" />
    <circle cx="150" cy="74" r="7" fill="#b5925e" />
    <path d="M145,74 Q130,95 125,110 M150,74 Q140,105 145,115" stroke="#365733" stroke-width="3" fill="none"/>
    
    <!-- Sack Body -->
    <path d="M22,76 C20,140 10,240 25,270 C35,285 70,290 100,290 C130,290 165,285 175,270 C190,240 180,140 178,76 Z" fill="url(#sackGrad)" />
    <!-- Texture details on sack -->
    <path d="M30,110 Q100,100 170,110 M35,160 Q100,150 165,160 M40,210 Q100,200 160,210 M45,250 Q100,240 155,250" stroke="#806232" stroke-width="1" stroke-dasharray="5,10" fill="none" opacity="0.4"/>
    
    <!-- Sack Label -->
    <rect x="40" y="105" width="120" height="120" rx="4" fill="#365733" />
    <rect x="45" y="110" width="110" height="110" rx="2" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" />
    
    <!-- Cow Silhouette drawing inside Label -->
    <g fill="#ede1ca" transform="translate(68, 120)">
      <!-- Simple cow face/body path -->
      <path d="M20,10 C13,10 8,15 8,22 C8,25 10,28 12,30 L8,38 L14,38 L16,34 L24,34 L26,38 L32,38 L28,30 C30,28 32,25 32,22 C32,15 27,10 20,10 Z M15,18 C16.5,18 17.5,19 17.5,20.5 C17.5,22 16.5,23 15,23 C13.5,23 12.5,22 12.5,20.5 C12.5,19 13.5,18 15,18 Z M25,18 C26.5,18 27.5,19 27.5,20.5 C27.5,22 26.5,23 25,23 C23.5,23 22.5,22 22.5,20.5 C22.5,19 23.5,18 25,18 Z" />
      <path d="M5,12 Q8,15 6,18 Z M35,12 Q32,15 34,18 Z" fill="#b5925e" /> <!-- Horns -->
    </g>
    
    <!-- Label Text -->
    <text x="100" y="185" font-family="'Outfit', sans-serif" font-size="10" font-weight="bold" fill="#ede1ca" text-anchor="middle" letter-spacing="1">HIGH NUTRIENT</text>
    <text x="100" y="202" font-family="'Lora', serif" font-size="12" font-style="italic" font-weight="bold" fill="#b5925e" text-anchor="middle">Agri Feed</text>
  </g>
  
  <!-- Outer Titles -->
  <text x="250" y="445" font-family="'Outfit', sans-serif" font-size="20" font-weight="bold" fill="#365733" text-anchor="middle">ARB HIGH-NUTRIENT AGRI FEED</text>
  <text x="250" y="465" font-family="'Inter', sans-serif" font-size="12" fill="#5a6459" text-anchor="middle">Premium Dairy Wanda &#8226; Formulated for High Yields</text>
</svg>
