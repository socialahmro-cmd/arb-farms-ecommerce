<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdfaf4" />
      <stop offset="100%" stop-color="#ede1ca" />
    </linearGradient>
    <!-- Pack Body Gradient (kraft paper style) -->
    <linearGradient id="kraftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dfc5a0" />
      <stop offset="100%" stop-color="#b89a70" />
    </linearGradient>
    <!-- Green Accent -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#365733" />
      <stop offset="100%" stop-color="#223d20" />
    </linearGradient>
    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#121912" flood-opacity="0.12" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="500" rx="20" fill="url(#bgGrad)"/>
  <rect x="15" y="15" width="470" height="470" rx="15" fill="none" stroke="#365733" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.4"/>
  
  <!-- Stand-up Pouch Pack Graphic -->
  <g filter="url(#shadow)" transform="translate(160, 90)">
    <!-- Pouch Top Seal & Zipper -->
    <path d="M15,40 L165,40 L160,25 L20,25 Z" fill="#b0936b" stroke="#8c714c" stroke-width="1" />
    <line x1="20" y1="33" x2="160" y2="33" stroke="#5c482e" stroke-width="1.5" stroke-dasharray="3,3" />
    
    <!-- Pouch Body -->
    <path d="M18,40 L162,40 C170,120 180,240 160,285 C145,295 110,298 90,298 C70,298 35,295 20,285 C0,240 10,120 18,40 Z" fill="url(#kraftGrad)" />
    
    <!-- Oval Window showing seeds inside -->
    <ellipse cx="90" cy="225" rx="45" ry="30" fill="#2d2215" opacity="0.95" />
    <!-- Seed Dots -->
    <g fill="#dfd0be">
      <circle cx="65" cy="220" r="2" /><circle cx="72" cy="212" r="1.5" /><circle cx="80" cy="225" r="2" /><circle cx="88" cy="218" r="1.5" />
      <circle cx="95" cy="228" r="2" /><circle cx="102" cy="215" r="1.5" /><circle cx="110" cy="222" r="2" /><circle cx="115" cy="232" r="1.5" />
      <circle cx="75" cy="235" r="1.5" /><circle cx="85" cy="240" r="2" /><circle cx="98" cy="238" r="1.5" /><circle cx="105" cy="230" r="2" />
      <circle cx="70" cy="228" r="2" /><circle cx="90" cy="210" r="1.5" /><circle cx="108" cy="208" r="2" /><circle cx="60" cy="225" r="1.5" />
    </g>
    <ellipse cx="90" cy="225" rx="45" ry="30" fill="none" stroke="#5c482e" stroke-width="2" />
    
    <!-- Pouch Label -->
    <rect x="30" y="55" width="120" height="120" rx="4" fill="url(#greenGrad)" />
    <rect x="35" y="60" width="110" height="110" rx="2" fill="none" stroke="#ede1ca" stroke-width="1.2" />
    
    <!-- Label Details -->
    <text x="90" y="85" font-family="'Outfit', sans-serif" font-size="10" font-weight="bold" fill="#ede1ca" text-anchor="middle" letter-spacing="1.5">ARB FARMS</text>
    <line x1="50" y1="92" x2="130" y2="92" stroke="#b5925e" stroke-width="1"/>
    
    <!-- Wheat ears drawing -->
    <g stroke="#b5925e" stroke-width="1" fill="none" transform="translate(75, 100)">
      <path d="M15,35 Q15,10 15,0 M15,5 Q10,2 10,0 M15,5 Q20,2 20,0 M15,12 Q8,9 8,7 M15,12 Q22,9 22,7 M15,19 Q10,16 10,14 M15,19 Q20,16 20,14" />
    </g>
    
    <text x="90" y="145" font-family="'Lora', serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">EDIBLE SEEDS</text>
    <text x="90" y="158" font-family="'Inter', sans-serif" font-size="7" fill="#b5925e" text-anchor="middle" letter-spacing="0.5">CHIA &amp; FLAX &#8226; 100% ORGANIC</text>
  </g>
  
  <!-- Outer Titles -->
  <text x="250" y="445" font-family="'Outfit', sans-serif" font-size="20" font-weight="bold" fill="#365733" text-anchor="middle">ARB EDIBLE CHIA &amp; FLAX SEEDS</text>
  <text x="250" y="465" font-family="'Inter', sans-serif" font-size="12" fill="#5a6459" text-anchor="middle">Superfood Nutrition &#8226; Rich in Omega-3 &amp; Fiber</text>
</svg>
